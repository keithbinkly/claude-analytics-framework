version: 1
last_updated: "2026-03-14"
purpose: "Inventory CCV3/global-layer dependencies used by analytics-workspace-promoted assets so they can be made explicit, classified, and migrated intentionally."

dependency_classes:
  hard_runtime:
    description: "analytics-workspace workflow breaks without this dependency."
  soft_runtime:
    description: "Improves behavior, but analytics-workspace should still function without it."
  authoring_only:
    description: "Needed to maintain or evolve the asset, not to consume it."
  replace_later:
    description: "Currently external, but should eventually be copied, wrapped, or re-homed into analytics-workspace."

dependency_types:
  - "skill"
  - "command"
  - "tool"
  - "mcp"
  - "script"
  - "memory"
  - "manifest"
  - "rule"
  - "doc"
  - "other"

policies:
  - "No promoted analytics-workspace asset should have an undocumented dependency on ~/.claude or other CCV3 layers."
  - "Prefer copying analytics-specific skills and commands into analytics-workspace before promoting an asset to team-ready status."
  - "Prefer leaving global tools and global memory external initially, but declare them explicitly."
  - "Every promoted asset should either declare graceful degradation or hard runtime requirements."
  - "No machine-specific absolute paths should be introduced to hide unresolved dependencies."

permitted_locations:
  global_layer:
    - "~/.claude/commands"
    - "~/.claude/skills"
    - "~/.claude/agent-memory"
    - "~/.claude/AGENTS.md"
  workspace:
    - ".claude/commands"
    - ".claude/skills"
    - ".claude/manifests"
    - "knowledge/"
    - "scripts/"

fallback_expectations:
  hard_runtime:
    required: true
    expected_behavior_if_missing: "Stop and explain what is missing and how to install, enable, or locate it."
  soft_runtime:
    required: false
    expected_behavior_if_missing: "Continue with reduced capability and explain the limitation."
  authoring_only:
    required: false
    expected_behavior_if_missing: "Consumption should continue; only maintenance workflows are affected."
  replace_later:
    required: false
    expected_behavior_if_missing: "Continue if possible; log as migration debt."


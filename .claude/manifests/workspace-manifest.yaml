version: 1
last_updated: "2026-03-11"
workspace_name: "analytics-workspace analytics workspace"
canonical_root: "/Users/kbinkly/git-repos/analytics-workspace"
purpose: "Canonical top-level root for the analytics operating system, shared agent platform, and nested analytics projects."
status: "planned_canonical_root"

principles:
  - "analytics-workspace is the canonical analytics platform root."
  - "analytics-workspace becomes canonical by replacing capabilities, not by declaration alone."
  - "dbt-enterprise stays intact as a production dbt project."
  - "data-centered stays intact as a content and visualization project."
  - "dbt-agent stays intact while selected high-leverage assets are promoted into analytics-workspace by copy."
  - "Analytics-specific commands, manifests, and selected skills should live in analytics-workspace."
  - "Global agent memory stays in ~/.claude/agent-memory/."
  - "Workflow preservation for active dbt pipeline development is a non-negotiable migration constraint."

precedence:
  - "If analytics-related guidance conflicts between analytics-workspace and ~/.claude, prefer analytics-workspace once the specific capability has been migrated and declared authoritative."
  - "For production dbt workflow constraints inside dbt-enterprise, prefer local project rules and docs."
  - "Use repo adapters to determine safe commands, environment constraints, and local state."
  - "dbt-agent remains authoritative for dbt-agent-specific operating depth until analytics-workspace has equivalent replacement coverage."

topology:
  shared_platform:
    path: "."
    owns:
      - ".claude/agents"
      - ".claude/skills"
      - ".claude/commands"
      - ".claude/rules"
      - ".claude/manifests"
      - "knowledge/platform"
      - "workstreams"
      - "telemetry"
      - "templates"
      - "scripts"
  linked_external_projects:
    - "./dbt-enterprise"
    - "./data-centered"
    - "./dbt-agent"
  global_memory_layer:
    - "~/.claude/agent-memory"

bootstrap_read_order:
  - "AGENT_ENTRYPOINT.md"
  - "README.md"
  - "CLAUDE.md"
  - ".claude/manifests/workspace-manifest.yaml"
  - ".claude/manifests/repo-adapters.yaml"
  - ".claude/manifests/workflow-contracts.yaml"
  - ".claude/manifests/ccv3-dependencies.yaml"
  - "knowledge/platform/planning/shared-agent-platform-monorepo-plan.md"

repo_categories:
  platform:
    description: "Shared analytics operating system and team-level agent infrastructure."
  production_dbt:
    description: "Operational dbt project with stricter safety and environment rules."
  content_product:
    description: "Publishing, storytelling, and showcase project."
  migration_source:
    description: "Transitional source repo whose reusable contents are being selectively copied into analytics-workspace while the source remains intact."

active_repos:
  - id: "caf"
    display_name: "analytics-workspace"
    path: "."
    category: "platform"
    state: "planned_canonical_team_entrypoint"
    ownership_model: "shared"
  - id: "dbt-enterprise"
    display_name: "dbt-enterprise"
    path: "./dbt-enterprise"
    category: "production_dbt"
    state: "intact"
    ownership_model: "linked_repo"
  - id: "data-centered"
    display_name: "data-centered"
    path: "./data-centered"
    category: "content_product"
    state: "intact"
    ownership_model: "linked_repo"
  - id: "dbt-agent"
    display_name: "dbt-agent"
    path: "./dbt-agent"
    category: "migration_source"
    state: "current_operational_reference_and_migration_source"
    ownership_model: "transitional_linked_repo"

live_state_locations:
  shared:
    - "workstreams/active"
    - "workstreams/archive"
    - "telemetry"
    - "knowledge/platform"
  per_repo:
    - "./dbt-enterprise/**/PLAN.md"
    - "/Users/kbinkly/git-data-centered/**/context.md"
    - "/Users/kbinkly/git-dbt-agent/**/PLAN.md"
    - "/Users/kbinkly/git-dbt-agent/.dots"

migration_policy:
  move_into_analytics_workspace:
    - "analytics-specific global agents"
    - "analytics-specific global commands"
    - "analytics-specific global skills"
    - "shared manifests and bootstrap docs"
    - "cross-repo coordination logic"
    - "dbt-agent high-leverage team-facing assets copied by promotion"
  keep_intact_in_nested_repos:
    - "dbt-enterprise model code and project structure"
    - "data-centered site/content structure"
    - "repo-local delivery artifacts"
    - "global agent memory"
    - "full dbt-agent source repo and pre-migration reference state"
  phase_out_from_dbt_agent:
    - "nothing by default during incremental migration"

promotion_rules:
  - "Prefer copy-promote over move-delete."
  - "Preserve dbt-agent workflow functionality during the entire migration."
  - "Promote highest-leverage team-shared assets first."
  - "Every promoted asset should record ownership or mirror status."
  - "Every promoted asset should declare CCV3/global-layer dependencies explicitly."
  - "Core workflow navigation should be expressible without Claude-only runtime features."

ownership_labels:
  allowed:
    - "source_of_truth: dbt-agent"
    - "source_of_truth: analytics-workspace"
    - "mirrored_from: dbt-agent"
    - "deprecated_copy: true"

cutover_requirements:
  dbt_agent_to_analytics_workspace:
    - "MCP tool routing"
    - "Preflight rules"
    - "QA standards and templates"
    - "Skill activation table"
    - "Pipeline orchestration commands"
    - "Agent loading specs"
    - "Anti-pattern enforcement"
    - "Decision trace lookup"
    - "Learning loop infrastructure"
    - "Workstream state management"

success_conditions:
  - "A non-Claude coding agent can bootstrap from analytics-workspace and route core workflows correctly."
  - "A new analytics agent can start at analytics-workspace and route correctly without guessing across roots."
  - "Shared analytics platform behavior is defined in analytics-workspace."
  - "Linked repos remain operationally intact."
  - "dbt-agent remains fully usable throughout migration."
  - "analytics-workspace exposes the highest-leverage shared assets for team use and contribution."
  - "Ownership of promoted assets is explicit."
  - "CCV3/global dependencies for promoted assets are explicit and classified."

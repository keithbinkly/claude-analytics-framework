# Recommended substitutions for each anti-pattern
substitutions:
  - pattern: NOT IN subquery
    impact: 4.18x
    why_slow: "NOT IN has NULL handling issues and prevents optimizer from using anti-join"
    alternatives:
      - name: NOT EXISTS
        preferred: true
        example: |
          -- ❌ Anti-pattern
          SELECT * FROM orders
          WHERE customer_id NOT IN (SELECT customer_id FROM churned_customers)

          -- ✅ NOT EXISTS (usually fastest)
          SELECT * FROM orders o
          WHERE NOT EXISTS (
              SELECT 1 FROM churned_customers c
              WHERE c.customer_id = o.customer_id
          )
      - name: LEFT JOIN IS NULL
        preferred: false
        example: |
          SELECT o.* FROM orders o
          LEFT JOIN churned_customers c ON o.customer_id = c.customer_id
          WHERE c.customer_id IS NULL

  - pattern: OR in JOIN
    impact: 4.07x
    why_slow: "OR prevents hash/merge joins, forcing nested loop scans"
    alternatives:
      - name: UNION ALL
        preferred: true
        example: |
          -- ❌ Anti-pattern
          SELECT * FROM transactions t
          JOIN accounts a ON t.from_account = a.id OR t.to_account = a.id

          -- ✅ UNION ALL with separate joins
          SELECT t.*, a.* FROM transactions t
          JOIN accounts a ON t.from_account = a.id
          UNION ALL
          SELECT t.*, a.* FROM transactions t
          JOIN accounts a ON t.to_account = a.id
          WHERE t.from_account != t.to_account  -- avoid duplicates if needed

  - pattern: Deep nesting (3+ levels)
    impact: 3.06x
    why_slow: "Deep subqueries are harder for optimizer to flatten and parallelize"
    alternatives:
      - name: CTEs
        preferred: true
        example: |
          -- ❌ Anti-pattern
          SELECT * FROM (
              SELECT * FROM (
                  SELECT * FROM (
                      SELECT * FROM orders WHERE status = 'active'
                  ) x WHERE amount > 100
              ) y WHERE region = 'US'
          ) z WHERE customer_type = 'premium'

          -- ✅ CTEs (flat structure)
          WITH active_orders AS (
              SELECT * FROM orders WHERE status = 'active'
          ),
          high_value AS (
              SELECT * FROM active_orders WHERE amount > 100
          ),
          us_region AS (
              SELECT * FROM high_value WHERE region = 'US'
          )
          SELECT * FROM us_region WHERE customer_type = 'premium'

  - pattern: SELECT *
    impact: 2.08x
    why_slow: "Redshift is columnar; fewer columns = less I/O. Also prevents schema drift bugs"
    alternatives:
      - name: Explicit columns
        preferred: true
        example: |
          -- ❌ Anti-pattern
          SELECT * FROM large_table

          -- ✅ Explicit column list
          SELECT id, customer_id, amount, created_at FROM large_table

  - pattern: DISTINCT in aggregation
    impact: 1.33x
    why_slow: "COUNT(DISTINCT) requires sorting/hashing entire dataset, limiting parallelism"
    alternatives:
      - name: Pre-GROUP BY
        preferred: true
        example: |
          -- ❌ Anti-pattern
          SELECT COUNT(DISTINCT customer_id) FROM orders

          -- ✅ Pre-aggregate with GROUP BY
          WITH distinct_customers AS (
              SELECT customer_id FROM orders GROUP BY customer_id
          )
          SELECT COUNT(*) FROM distinct_customers
      - name: APPROXIMATE
        preferred: false
        note: "Use when exact count not required"
        example: |
          SELECT APPROXIMATE COUNT(DISTINCT customer_id) FROM orders

  - pattern: CROSS JOIN
    impact: 1.28x
    why_slow: "Cross joins produce M×N rows; often indicates missing join condition"
    alternatives:
      - name: Explicit JOIN with condition
        preferred: true
        example: |
          -- ❌ Anti-pattern (often accidental)
          SELECT * FROM table_a, table_b

          -- ✅ Explicit JOIN
          SELECT * FROM table_a
          INNER JOIN table_b ON table_a.key = table_b.key


  - column: case when ts_or_ds_diff(cast(c.createddate as date), afc.first_case_date,
      day) <= 30 then 'tenure 0 - 30 days' when ts_or_ds_diff(cast(c.createddate as
      date), afc.first_case_date, day) between 31 and 60 then 'tenure 31 - 60 days'
      when ts_or_ds_diff(cast(c.createddate as date), afc.first_case_date, day) between
      61 and 90 then 'tenure 61 - 90 days' when ts_or_ds_diff(cast(c.createddate as
      date), afc.first_case_date, day) >= 91 then 'tenure 91+days' end
    frequency: 34
  - column: cast(null as varchar)
    frequency: 34
  resolution: 'Disambiguate using prefixes: createddate as date), afc_first_case_date,
    day) >= 91 then ''tenure 91+days'' end, agent_tenure_2'
- alias: advisor_csat
  used_for:
  - column: case when greendot_cc_apple_recommend_advisor_scale ilike '%strongly agree%'
      then 5 when greendot_cc_apple_recommend_advisor_scale ilike '%somewhat agree%'
      then 4 when greendot_cc_apple_recommend_advisor_scale ilike '%neither agree
      nor disagree%' then 3 when greendot_cc_apple_recommend_advisor_scale ilike '%somewhat
      disagree%' then 2 when greendot_cc_apple_recommend_advisor_scale ilike '%strongly
      disagree%' then 1 else null end
    frequency: 34
  - column: cast(null as int)
    frequency: 34
  resolution: 'Disambiguate using prefixes: advisor_csat_1, advisor_csat_2'
- alias: is_autolog
  used_for:
  - column: case when resolution__c like 'auto%' then 1 else 0 end
    frequency: 34
  - column: cast(null as int)
    frequency: 34
  resolution: 'Disambiguate using prefixes: is_autolog_1, is_autolog_2'
- alias: rn
  used_for:
  - column: row_number() over (partition by sor_txn_type order by sor_txn_type nulls
      last)
    frequency: 34
  - column: row_number() over (partition by t.posttransactionkey, t.sor_uid order
      by pid.changedate desc)
    frequency: 1
  resolution: 'Disambiguate using prefixes: rn_1, sor_uid order by pid_changedate
    desc)'
